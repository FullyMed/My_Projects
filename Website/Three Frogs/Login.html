    <body>

        <header>
            <nav class="navbar">
                <div class="logo">🐸 Three Frogs</div>
                <button class="nav-toggle" id="navToggle" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
                <ul class="nav-links" id="navLinks"></ul>
            </nav>
        </header>

        <section class="login-container">
            <h2>Login to Your Account</h2>
            <form id="loginForm" action="Assets/PHP/login.php" method="POST">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" name="email" required />

                <label for="loginPassword">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" name="password" placeholder="Enter password" required />
                    <span id="toggleLoginPassword" class="toggle-password">👁️</span>
                </div>             
                <button type="submit">Login</button>
            </form>
            <div class="register">
                <p><a href="Forgot-password.html">Forgot Password?</a></p>
            </div>
            <div class="register">
                <p>Don't have an account? <a href="Signup.html">Register</a></p>
            </div>
            <div id="errorMessage" class="hidden"></div>
            <div id="loginResult"></div>
        </section>

        <footer>
            <p>&copy; 2025 Three Frogs Boardgame Surabaya</p>
        </footer>

        <button id="scrollTopBtn" title="Back to Top">⬆️</button>
