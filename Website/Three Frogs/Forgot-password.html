<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

        <title>Forgot Password | Three Frogs Boardgame</title>
        <meta name="description" content="Reset your password for Three Frogs Boardgame Surabaya. Get back to booking and playing exciting board games!" />
        <meta name="author" content="Maximilliano Felix" />

        <!-- Open Graph Meta Tags -->
        <meta property="og:site_name" content="Three Frogs" />
        <meta property="og:title" content="Forgot Password | Three Frogs Boardgame" />
        <meta property="og:description" content="Reset your password for Three Frogs Boardgame Surabaya. Get back to booking and playing exciting board games!" />
        <meta property="og:url" content="https://threefrogsboardgame.com/Forgot-password.html" />

        <!-- Favicon Support -->
        <link rel="icon" type="image/png" sizes="32x32" href="Assets/Images/favicon_io/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="Assets/Images/favicon_io/favicon-16x16.png" />
        <link rel="icon" type="image/x-icon" href="Assets/Images/favicon_io/favicon.ico" />
        <link rel="apple-touch-icon" href="Assets/Images/favicon_io/apple-touch-icon.png" />
        <link rel="manifest" href="Assets/Images/favicon_io/site.webmanifest" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <!-- Stylesheet -->
        <link rel="stylesheet" href="Assets/CSS/Boardgame.css" />

    </head>

    <body>

        <header>
            <nav class="navbar">
                <div class="logo">🐸 Three Frogs</div>
                <button class="nav-toggle" id="navToggle" aria-label="Open navigation menu" aria-expanded="false"><span></span><span></span><span></span></button>
                <ul class="nav-links" id="navLinks"></ul>
            </nav>
        </header>

        <section class="booking-form">
            <h2>Reset Your Password</h2>

            <!-- Step 1: request a reset link -->
            <div id="requestStep">
                <p>Enter your email address and we'll send you a link to reset your password.</p>
                <form id="requestForm">
                    <label for="resetEmail">Email Address</label>
                    <input type="email" id="resetEmail" name="email" placeholder="Enter your registered email" required />
                    <button type="submit">Send Reset Link</button>
                </form>
                <div id="requestResult"></div>
            </div>

            <!-- Step 2: set a new password (shown when ?token= is present in the URL) -->
            <div id="resetStep" class="hidden">
                <p>Enter your new password below.</p>
                <form id="forgotForm">
                    <label for="newPassword">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="newPassword" name="password" placeholder="Enter new password" required />
                        <span id="toggleForgotPassword" class="toggle-password">👁️</span>
                    </div>
                    <button type="submit">Reset Password</button>
                </form>
                <div id="forgotResult"></div>
            </div>
        </section>

        <footer>
            <p>© 2025 Three Frogs Boardgame Surabaya</p>
        </footer>

        <button id="scrollTopBtn" title="Back to Top">⬆️</button>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="Assets/JS/Forgot-password.js"></script>
        <script src="Assets/JS/Navbar.js"></script>

    </body>
</html>
