name: taiwan_fare_finder
description: "Navigate Taiwan's vibrant public transport with ease! This Flutter app is your ultimate fare guide, helping you quickly search, compare, and save routes across all major modes, all in one friendly, multilingual interface."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  package_info_plus: ^9.0.0
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - lib/l10n/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true